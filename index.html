<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Card Counter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div id="setup-header">
            <h1>Stich-Zähler</h1>
        </div>
        
        <div id="game-header" class="hidden" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <button id="back-to-setup-btn" class="icon-btn">⬅️ Zurück</button>
            <div id="game-info">Karten: <span id="current-cards">1</span></div>
            <div style="width: 80px;"></div> </div>
    </header>

    <main id="app">
        <section id="setup-screen">
            <h2>Wer spielt mit?</h2>
            <div id="available-players-container" class="player-pool"></div>
            <div class="input-group">
                <input type="text" id="new-player-name" placeholder="Neuer Spieler...">
                <button id="add-new-player-btn">Dazu</button>
            </div>
            <button id="start-game-btn" class="primary-btn" disabled>Spiel starten</button>
        </section>

        <section id="game-screen" class="hidden">
            <div class="table-container">
                <table id="score-table">
                    <thead>
                        <tr id="table-header-row">
                            <th>Karten</th>
                            </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
            <button id="open-input-modal-btn" class="primary-btn">Eingabe starten</button>
        </section>
    </main>

    <div id="input-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Phase</h2>
            <p id="modal-subtitle" class="subtitle">Spieler</p>
            
            <div id="dynamic-button-grid" class="button-grid">
                </div>
            
            <button id="cancel-input-btn" class="secondary-btn" style="margin-top: 20px; width: 100%;">Abbrechen</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>

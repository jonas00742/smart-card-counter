<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Card Counter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div id="setup-header">
            <h1>Stich-Zähler</h1>
        </div>
        
        <div id="game-header" class="hidden header-layout">
            <div class="header-left">
                <button id="back-to-setup-btn" class="icon-btn btn-with-icon">
                    <span class="back-icon">◀</span> Zurück
                </button>
            </div>
            <div class="header-center">
                <h1 class="m-0 text-md">Stich-Zähler</h1>
            </div>
            <div id="game-info" class="header-right text-sm">
                Karten: <span id="current-cards">1</span>
            </div>
        </div>
    </header>

    <main id="app">
        <section id="setup-screen">
            <h2>1. Spieler anlegen</h2>
            <div class="input-group">
                <input type="text" id="new-player-name" placeholder="Neuer Spieler...">
                <button id="add-new-player-btn" class="primary-btn add-btn">+</button>
            </div>
            
            <p class="subtitle mb-sm">Aus dem Pool wählen:</p>
            <div id="available-players-container" class="player-pool"></div>

            <h2>2. Spielreihenfolge</h2>
            <p class="subtitle text-sm">Sortiere so, wie ihr am Tisch sitzt.</p>
            <div id="active-players-container" class="player-list-vertical"></div>

            <button id="install-app-btn" class="primary-btn btn-success hidden mb-sm">
                📲 App installieren
            </button>
            <button id="start-game-btn" class="primary-btn" disabled>Spiel starten</button>
        </section>

        <section id="game-screen" class="hidden">
            <div class="sticky-top-container">
                <button id="open-input-modal-btn" class="primary-btn">Eingabe starten</button>
            </div>

            <div class="table-container">
                <table id="score-table">
                    <thead>
                        <tr id="table-header-row">
                            <th class="narrow-col">Runde</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="input-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header-custom">
                <button id="modal-prev-btn" class="modal-nav-btn">◀</button>
                <div class="text-center">
                    <h2 id="modal-title" class="m-0">Phase</h2>
                    <p id="modal-subtitle" class="subtitle m-0">Spieler</p>
                </div>
                <button id="modal-next-btn" class="modal-nav-btn">▶</button>
            </div>
            
            <div id="modal-indicators" class="modal-indicators"></div>
            <div id="dynamic-button-grid" class="button-grid"></div>
            
            <button id="save-input-btn" class="primary-btn btn-success mt-md hidden">Fertig</button>
            <button id="cancel-input-btn" class="secondary-btn mt-sm w-100">Abbrechen</button>
        </div>
    </div>

    <div id="edit-choice-modal" class="modal hidden flex-center">
        <div class="modal-content edit-choice-content">
            <h2 class="text-center mb-lg">Was bearbeiten?</h2>
            <div class="flex-col-gap">
                <button id="edit-ansage-btn" class="primary-btn">Ansagen</button>
                <button id="edit-gemacht-btn" class="primary-btn btn-primary-dark">Gemachte Stiche</button>
                <button id="cancel-edit-choice-btn" class="secondary-btn mt-sm">Abbrechen</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>

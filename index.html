<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Card Counter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
        <div id="setup-header">
            <h1>Stich-Zähler</h1>
        </div>
        
        <div id="game-header" class="hidden" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div style="flex: 1; display: flex; justify-content: flex-start;">
                <button id="back-to-setup-btn" class="icon-btn" style="display: flex; align-items: center; gap: 5px;">
                    <span style="font-size: 1.2rem;">◀</span> Zurück
                </button>
            </div>
            
            <div style="flex: 1; text-align: center;">
                <h1 style="margin: 0; font-size: 1.3rem;">Stich-Zähler</h1>
            </div>
            
            <div id="game-info" style="flex: 1; text-align: right; font-weight: bold; font-size: 0.9rem;">
                Karten: <span id="current-cards">1</span>
            </div>
        </div>
    </header>

    <main id="app">
        <section id="setup-screen">
            <h2>1. Spieler anlegen</h2>
            <div class="input-group">
                <input type="text" id="new-player-name" placeholder="Neuer Spieler...">
                <button id="add-new-player-btn" class="primary-btn add-btn">+</button>
            </div>
            
            <p class="subtitle" style="margin-bottom: 5px;">Aus dem Pool wählen:</p>
            <div id="available-players-container" class="player-pool"></div>

            <h2>2. Spielreihenfolge</h2>
            <p class="subtitle" style="font-size: 0.9rem;">Sortiere so, wie ihr am Tisch sitzt.</p>
            <div id="active-players-container" class="player-list-vertical">
                </div>

            <button id="start-game-btn" class="primary-btn" disabled>Spiel starten</button>
        </section>

        <section id="game-screen" class="hidden">
            <div class="sticky-top-container">
                <button id="open-input-modal-btn" class="primary-btn">Eingabe starten</button>
            </div>

            <div class="table-container">
                <table id="score-table">
                    <thead>
                        <tr id="table-header-row">
                            <th>
                                <div style="display: flex; align-items: center; justify-content: space-between;">
                                    <span>Runde</span>
                                    <button id="main-edit-toggle-btn" class="icon-btn dark-icon" style="padding: 0 4px;">✏️</button>
                                </div>
                            </th>
                            </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="input-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header-custom">
                <button id="modal-prev-btn" class="icon-btn dark-icon">◀</button>
                <div style="text-align: center;">
                    <h2 id="modal-title" style="margin: 0;">Phase</h2>
                    <p id="modal-subtitle" class="subtitle" style="margin: 0;">Spieler</p>
                </div>
                <button id="modal-next-btn" class="icon-btn dark-icon">▶</button>
            </div>
            
            <div id="modal-indicators" class="modal-indicators"></div>
            
            <div id="dynamic-button-grid" class="button-grid"></div>
            
            <button id="save-input-btn" class="primary-btn hidden" style="margin-top: 15px; background-color: var(--color-success);">Fertig & Speichern</button>
            <button id="cancel-input-btn" class="secondary-btn" style="margin-top: 10px; width: 100%;">Abbrechen</button>
        </div>
    </div>

    <div id="edit-choice-modal" class="modal hidden">
        <div class="modal-content" style="border-radius: var(--space-lg); padding-bottom: 30px;">
            <h2 style="text-align: center; margin-bottom: 20px;">Was bearbeiten?</h2>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button id="edit-ansage-btn" class="primary-btn">Ansagen</button>
                <button id="edit-gemacht-btn" class="primary-btn" style="background-color: var(--color-primary);">Gemachte Stiche</button>
                <button id="cancel-edit-choice-btn" class="secondary-btn" style="margin-top: 10px;">Abbrechen</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
